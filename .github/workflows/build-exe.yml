name: Build check_dxf.exe

# Збирає Windows .exe у хмарі (безкоштовна Windows-машина GitHub).
# Запуск: вкладка Actions -> Build check_dxf.exe -> Run workflow.
# Готовий файл -> внизу сторінки запуску, розділ Artifacts -> check_dxf-windows.

on:
  workflow_dispatch:        # ручний запуск кнопкою
  push:
    paths:
      - check_dxf.py
      - .github/workflows/build-exe.yml

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller olefile

      - name: Build exe (3D .ipt vs DXF)
        run: pyinstaller --onefile --console --name check_ipt_vs_dxf check_ipt_vs_dxf.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: check_ipt_vs_dxf-windows
          path: dist/check_ipt_vs_dxf.exe
